<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WCB Personal Financing Calculator</title>
<style>
:root{
  --gold:#c9982e;
  --gold2:#f0cf78;
  --black:#0d0d0f;
  --panel:#ffffff;
  --soft:#f7f4ed;
  --green:#168447;
  --red:#b3261e;
  --text:#171717;
  --muted:#6b6b6b;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,"Microsoft YaHei",sans-serif;
  background:
    radial-gradient(circle at top left, #fff7df 0, transparent 30%),
    linear-gradient(135deg,#f7f7f7,#ececec);
  color:var(--text);
}
.wrap{
  max-width:1040px;
  margin:22px auto;
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 16px 45px #0003;
  border:1px solid #e8e0cf;
}
header{
  background:linear-gradient(135deg,#090909,#1c1c1f 70%,#33250d);
  color:white;
  padding:22px 28px;
  border-bottom:6px solid var(--gold);
  display:flex;
  align-items:center;
  gap:20px;
}
.logo{
  width:90px;height:90px;object-fit:contain;flex:0 0 auto;
  filter:drop-shadow(0 4px 12px #0008);
}
.headtext{text-align:left}
header h1{margin:0;color:var(--gold2);font-size:25px;line-height:1.15;letter-spacing:.4px}
header p{margin:8px 0 0;font-weight:bold;letter-spacing:1.8px;color:#fff}
.badge{
  display:inline-block;margin-top:10px;padding:5px 10px;border:1px solid #d6b35d;
  color:#f6d98a;border-radius:999px;font-size:12px;font-weight:bold;
}
main{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:22px}
.card{
  border:1px solid #e2dccd;
  border-radius:18px;
  overflow:hidden;
  background:var(--panel);
  box-shadow:0 7px 20px #00000012;
}
.card h2{
  margin:0;
  background:linear-gradient(135deg,var(--gold),#e5bd5e);
  padding:12px 14px;
  text-align:center;
  font-size:18px;
  letter-spacing:1px;
}
.row{
  display:grid;
  grid-template-columns:1.12fr 1fr;
  gap:10px;
  align-items:center;
  padding:11px 15px;
  border-bottom:1px solid #eee8db;
}
.row:nth-child(even){background:#fffdf8}
.row label{font-weight:bold}
small{font-weight:normal;color:var(--muted)}
input,select{
  font-size:16px;
  padding:9px 10px;
  border:1px solid #cfc7b5;
  border-radius:10px;
  text-align:right;
  background:white;
  outline:none;
}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px #c9982e22}
.result .row span{text-align:right;font-weight:bold}
.big{font-size:22px;color:var(--gold);font-weight:900!important}
.goldValue{font-size:21px;color:var(--gold);font-weight:900!important}
.status{padding:16px;text-align:center;font-size:26px;font-weight:900;color:white;letter-spacing:1px}
.layak{background:linear-gradient(135deg,#168447,#0d6d37)}
.not{background:linear-gradient(135deg,#b3261e,#831a15)}
.footer{
  padding:4px 22px 24px;
  text-align:center;
}
.note{
  color:#555;
  font-size:13px;
  line-height:1.5;
  background:#faf7ef;
  border:1px solid #eadfca;
  border-radius:14px;
  padding:12px 16px;
  margin-bottom:14px;
}
button{
  padding:13px 22px;
  border:0;
  border-radius:12px;
  background:linear-gradient(135deg,#111,#333);
  color:white;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 6px 16px #0003;
}
button:hover{filter:brightness(1.12)}
@media(max-width:760px){
  main{grid-template-columns:1fr;padding:14px}
  .wrap{margin:0;border-radius:0}
  header{justify-content:center;text-align:center;flex-direction:column}
  .headtext{text-align:center}
  .logo{width:72px;height:72px}
}
@media print{
  body{background:white}
  .wrap{box-shadow:none;margin:0;border-radius:0}
  .no-print{display:none}
  main{grid-template-columns:1fr 1fr}
}
</style>
</head>

<main>
<section class="card">
<h2>INPUT</h2>
<div class="row"><label>Applicant Name</label><input id="name" type="text" style="text-align:left"></div>
<div class="row"><label>IC No.</label><input id="ic" type="text" style="text-align:left"></div>
<div class="row"><label>Employer</label><input id="emp" type="text" style="text-align:left"></div>
<div class="row"><label>Total Income (RM)</label><input id="income" type="number" value="0" step="0.01"></div>
<div class="row"><label>Current Total Deduction (RM)</label><input id="deduction" type="number" value="0" step="0.01"></div>
<div class="row"><label>In Transit (RM)</label><input id="intransit" type="number" value="0" step="0.01"></div>
<div class="row"><label>Settlement<br><small>Monthly Payment (RM)</small></label><input id="settlement" type="number" value="0" step="0.01"></div>
<div class="row"><label>Interest</label><select id="rate"><option value="0.0999">9.99%</option><option value="0.1199">11.99%</option></select></div>
<div class="row"><label>Tempoh (Years)</label><select id="years"></select></div>
</section>

<section class="card result">
<h2>RESULT</h2>
<div class="row"><label>Kelayakan Bulanan</label><span id="kelayakanBulanan" class="big"></span></div>
<div class="row"><label>Max Loan</label><span id="maxloan" class="big"></span></div>
<div class="row"><label>Loan Amount (RM)</label><input id="loan" type="number" value="0" step="100"></div>
<div class="row"><label>On Hand</label><span id="onhand" class="big"></span></div>
<div class="row"><label>Yuran</label><span id="yuranOut"></span></div>
<div class="row"><label>Payment</label><span id="payment"></span></div>
<div class="row"><label>Total Monthly Deduction<br><small>Payment + Yuran</small></label><span id="totalMonthlyOut" class="goldValue"></span></div>
<div class="row"><label>Baki Gaji</label><span id="baki"></span></div>
<div class="row"><label>Baki %</label><span id="bakiPct"></span></div>
<div class="row"><label>Warning</label><span id="warning"></span></div>
<div id="status" class="status layak">LAYAK</div>
</section>
</main>

<div class="footer">
<div class="note">
Calculation is for estimation only. Final approval is subject to eligibility, documents verification, and HQ approval.
</div>
<button class="no-print" onclick="window.print()">Print / Save PDF</button>
</div>
</div>

<script>
const FIXED_YURAN = 30;
const FIXED_PAYOUT = 0.75;
const MIN_BAKI_GAJI = 1100;

const yearsEl = document.getElementById("years");
for(let i=1;i<=10;i++){let o=document.createElement('option');o.value=i;o.textContent=i;if(i===10)o.selected=true;yearsEl.appendChild(o);}
["income","deduction","intransit","settlement","rate","years","loan"].forEach(id=>{
  document.getElementById(id).addEventListener("input",calc);
  document.getElementById(id).addEventListener("change",calc);
});
function n(id){return parseFloat(document.getElementById(id).value)||0}
function rm(x){return "RM"+(isFinite(x)?x:0).toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2})}
function pct(x){return (isFinite(x)?x:0).toFixed(2)+"%"}
function calc(){
  let income=n("income"), ded=n("deduction"), it=n("intransit"), settlement=n("settlement");
  let rate=n("rate"), yrs=n("years"), loan=n("loan");
  let months=yrs*12;
  let kelayakan=income*0.6-ded-it+settlement;
  let paymentAvailable=Math.max(0, kelayakan - FIXED_YURAN);
  let maxLoan=(1+rate*yrs)>0 ? paymentAvailable*months/(1+rate*yrs) : 0;
  let monthlyPayment=months>0 ? loan*(1+rate*yrs)/months : 0;
  let totalMonthlyDeduction=monthlyPayment+FIXED_YURAN;
  let newDeduction=ded+totalMonthlyDeduction;
  let baki=income-newDeduction;
  let bakiP=income?baki/income*100:0;
  let onhand=loan*FIXED_PAYOUT;

  document.getElementById("kelayakanBulanan").textContent=rm(kelayakan);
  document.getElementById("maxloan").textContent=rm(maxLoan);
  document.getElementById("onhand").textContent=rm(onhand);
  document.getElementById("yuranOut").textContent=rm(FIXED_YURAN);
  document.getElementById("payment").textContent=rm(monthlyPayment);
  document.getElementById("totalMonthlyOut").textContent=rm(totalMonthlyDeduction);
  document.getElementById("baki").textContent=rm(baki);
  document.getElementById("bakiPct").textContent=pct(bakiP);

  let overLoan = loan > maxLoan + 0.005;
  let over60 = newDeduction > income*0.6 + 0.005;
  let lowBaki = baki < MIN_BAKI_GAJI - 0.005;
  let warn = [];
  if(overLoan) warn.push("Loan Amount > Max Loan");
  if(over60) warn.push("Potongan > 60%");
  if(lowBaki) warn.push("Baki Gaji < RM1,100");
  if(paymentAvailable <= 0) warn.push("Tiada kelayakan");
  document.getElementById("warning").textContent = warn.length ? warn.join(" / ") : "-";

  let ok = !overLoan && !over60 && !lowBaki && paymentAvailable > 0;
  let st=document.getElementById("status");
  st.textContent=ok?"LAYAK":"TIDAK LAYAK";
  st.className="status "+(ok?"layak":"not");
}
calc();
</script>
